<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loota - Create Your AR Treasure Hunt</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <header>
      <h1>Loota</h1>
    </header>

    <main>
      <div class="hunt-type-selector">
        <h3>Choose Your Hunt Type:</h3>
        <div class="hunt-type-options">
          <label class="hunt-type-label">
            <input type="radio" name="huntType" value="geolocation" checked />
            <span class="hunt-type-text">Geolocation (Map-based)</span>
          </label>
          <label class="hunt-type-label">
            <input type="radio" name="huntType" value="proximity" />
            <span class="hunt-type-text">Proximity (Relative to Player)</span>
          </label>
        </div>
      </div>

      <div class="map-and-list-container">
        <div id="map-container">
          <div id="map"></div>
        </div>
        <div class="list-wrapper">
          <div id="coordinates-display"></div>
          <div class="list-controls">
            <button id="delete-last-button" class="btn btn-secondary">
              Delete Last Pin
            </button>
            <button id="clear-all-button" class="btn btn-danger">
              Clear All Pins
            </button>
          </div>
        </div>
      </div>

      <div id="proximity-view-container" class="hidden-view">
        <div id="proximity-interaction-area">
          <p class="proximity-instructions">
            Click within the circle to place markers. Adjust radius with the
            slider below.
          </p>
          <div id="proximity-radius-slider-container">
            <label for="proximityRadiusSlider" class="radius-label">
              Radius: <span id="proximityRadiusDisplay">10 ft</span>
            </label>
            <input
              type="range"
              id="proximityRadiusSlider"
              min="0"
              max="2"
              value="0"
            />
            <div class="slider-labels">
              <span>10ft</span>
              <span>50ft</span>
              <span>100ft</span>
            </div>
          </div>
          <div id="proximity-circle-wrapper">
            <div id="proximity-circle">
              <span class="cardinal-direction north">N</span>
              <span class="cardinal-direction south">S</span>
              <span class="cardinal-direction west">W</span>
              <span class="cardinal-direction east">E</span>
              <svg
                class="player-icon"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                width="24"
                height="24"
              >
                <path
                  d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
                />
              </svg>
            </div>
          </div>
        </div>

        <div class="list-wrapper">
          <div id="proximity-coordinates-display"></div>
          <div class="list-controls">
            <button id="delete-last-proximity-button" class="btn btn-secondary">
              Delete Last Marker
            </button>
            <button id="clear-all-proximity-button" class="btn btn-danger">
              Clear All Markers
            </button>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="encourage-button" class="btn btn-primary">
          Encourage Looting
        </button>
      </div>

      <div id="result-area">
        Your treasure hunt link will appear here:
        <span id="result-url"></span>
        <button id="copy-button" class="btn btn-primary" style="display: none">
          Copy Link
        </button>
      </div>
    </main>

    <footer>&copy; 2025 Loota - Spreading Joy Through Discovery</footer>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
